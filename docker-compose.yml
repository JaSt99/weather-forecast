name: weather-forecast

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: weather-forecast-php
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET}

  nginx:
    image: nginx:1.27-alpine
    container_name: weather-forecast-nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_started

  memcached:
    image: memcached:1.6-alpine
    container_name: weather-forecast-memcached
    ports:
      - "${MEMCACHED_PORT:-11211}:11211"

  mysql:
    image: mysql:8.4
    container_name: weather-forecast-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql:/var/lib/mysql

volumes:
  mysql:
    name: weather-forecast-mysql
