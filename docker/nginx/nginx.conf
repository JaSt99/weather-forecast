limit_req_zone $binary_remote_addr zone=api_global:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_forecast:10m rate=10r/m;
limit_req_status 429;

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;

    location / {
        limit_req zone=api_global burst=20 nodelay;
        try_files $uri /index.php$is_args$args;
    }

    location ^~ /api/v1/weather/forecast {
        limit_req zone=api_global burst=20 nodelay;
        limit_req zone=api_forecast burst=5 nodelay;
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
