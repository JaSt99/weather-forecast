nelmio_api_doc:
    documentation:
        info:
            title: Weather Forecast API
            description: REST API for weather forecast
            version: 1.0.0
        components:
            securitySchemes:
                apiKey:
                    type: apiKey
                    in: header
                    name: X-API-Key
        security:
            - apiKey: []
    areas:
        path_patterns:
            - ^/api(?!/doc)
